name: Monthly SEEA update

on:
  workflow_dispatch:

  schedule:
    # На 1-во число всеки месец в 06:15 UTC
    - cron: "15 6 1 * *"

permissions:
  contents: write

concurrency:
  group: seea-monthly-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download and merge SEEA data
        run: python scraper.py

      - name: Show generated files
        run: ls -lah data

      - name: Commit new or updated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "Няма промени за commit."
            exit 0
          fi

          git commit -m "chore(data): monthly SEEA update $(date -u +%F)"
          git push